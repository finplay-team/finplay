# 로컬 개발용 인프라. bootRun 시 spring-boot-docker-compose가 자동으로 띄우고 연결한다.
services:
  mysql:
    image: mysql:8.4
    environment:
      MYSQL_ROOT_PASSWORD: local-only
      MYSQL_DATABASE: finplay
    ports:
      # 로컬 MySQL(3306)이나 다른 프로젝트 스택(13306)과 충돌하지 않는 포트.
      # spring-boot-docker-compose가 매핑 포트를 자동 감지하므로 앱 설정 불필요.
      - "13307:3306"

  redis:
    image: redis:7.4
    ports:
      # 로컬 Redis(6379)와 충돌하지 않는 포트. spring-boot-docker-compose가 자동 감지한다.
      - "16379:6379"

  # Kafka는 2차(PRD §7) 준비용. 1차 업무 코드는 사용하지 않으며 앱 의존성·기동 조건에서 제외한다.
  # (spring-kafka 미의존이라 앱은 이 컨테이너에 연결을 시도하지 않는다.)
  kafka:
    image: apache/kafka:3.9.1
    ports:
      - "19092:9092"
